<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Simple Clock</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: transparent;
}

body {
  display: grid;
  place-items: center;
}

.clock {
  width: 230px;
  height: 105px;
  padding: 15px 18px;
  border-radius: 18px;

  background: rgba(172, 188, 203, 0.42);
  border: 1px solid rgba(255, 255, 255, 0.42);

  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.35),
    0 8px 24px rgba(80, 100, 120, .12);

  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);

  color: rgba(255,255,255,.94);
  font-family: "Instrument Serif", Georgia, serif;
}

.time {
  font-size: 48px;
  line-height: .78;
  letter-spacing: -0.04em;
  white-space: nowrap;
}

.ampm {
  font-size: 32px;
  margin-left: 3px;
}

.day {
  margin-top: 8px;
  font-size: 15px;
  line-height: .82;
  letter-spacing: -0.02em;
  text-transform: uppercase;
}

.date {
  font-size: 26px;
  line-height: .86;
  letter-spacing: -0.03em;
}
</style>
</head>

<body>
  <div class="clock">
    <div class="time">
      <span id="time">12:05</span><span id="ampm" class="ampm">pm</span>
    </div>
    <div id="day" class="day">SATURDAY</div>
    <div id="date" class="date">March 28</div>
  </div>

<script>
function updateClock() {
  const now = new Date();

  const timeParts = new Intl.DateTimeFormat("en-US", {
    hour: "numeric",
    minute: "2-digit",
    hour12: true
  }).formatToParts(now);

  const hour = timeParts.find(part => part.type === "hour")?.value || "12";
  const minute = timeParts.find(part => part.type === "minute")?.value || "00";
  const ampm = (timeParts.find(part => part.type === "dayPeriod")?.value || "").toLowerCase();

  const day = new Intl.DateTimeFormat("en-US", {
    weekday: "long"
  }).format(now).toUpperCase();

  const date = new Intl.DateTimeFormat("en-US", {
    month: "long",
    day: "numeric"
  }).format(now);

  document.getElementById("time").textContent = hour + ":" + minute;
  document.getElementById("ampm").textContent = ampm;
  document.getElementById("day").textContent = day;
  document.getElementById("date").textContent = date;
}

updateClock();
setInterval(updateClock, 1000);
</script>
</body>
</html>
