<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Clock Widget</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  width: 100vw;
  height: 100vh;
  display: grid;
  place-items: center;
  background: transparent;
  font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

.clock-card {
  width: 230px;
  height: 150px;
  border-radius: 30px;
  padding: 24px 26px;
  text-align: center;
  position: relative;
  overflow: hidden;

  background:
    radial-gradient(circle at 20% 15%, rgba(255,255,255,.9), transparent 30%),
    linear-gradient(145deg, rgba(246,250,255,.74), rgba(222,235,248,.36));

  border: 1px solid rgba(255,255,255,.8);

  box-shadow:
    0 22px 50px rgba(118, 151, 184, .18),
    inset 0 1px 18px rgba(255,255,255,.85);

  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
}

.clock-card::before {
  content: "";
  position: absolute;
  inset: -40%;
  background: linear-gradient(
    120deg,
    transparent 40%,
    rgba(255,255,255,.55) 50%,
    transparent 60%
  );
  transform: translateX(-35%) rotate(10deg);
  animation: shimmer 5.5s ease-in-out infinite;
}

.clock-card::after {
  content: "";
  position: absolute;
  width: 90px;
  height: 90px;
  right: -35px;
  bottom: -45px;
  border-radius: 50%;
  background: rgba(175, 207, 234, .22);
  filter: blur(8px);
}

.label {
  position: relative;
  z-index: 1;
  font-size: 10px;
  letter-spacing: .22em;
  font-weight: 600;
  color: #9bb0c4;
  margin-bottom: 15px;
}

#time {
  position: relative;
  z-index: 1;
  font-size: 36px;
  line-height: 1;
  letter-spacing: -0.04em;
  font-weight: 500;
  color: #52677c;
}

#date {
  position: relative;
  z-index: 1;
  margin-top: 13px;
  font-size: 11px;
  letter-spacing: .08em;
  font-weight: 500;
  color: #9aacbd;
}

.dot {
  position: relative;
  z-index: 1;
  width: 4px;
  height: 4px;
  margin: 13px auto 0;
  border-radius: 50%;
  background: #bdd3e8;
  box-shadow: 0 0 12px rgba(166, 203, 235, .9);
  animation: pulse 2.6s ease-in-out infinite;
}

@keyframes shimmer {
  0%, 72%, 100% {
    transform: translateX(-65%) rotate(10deg);
    opacity: 0;
  }
  82% {
    opacity: .65;
  }
  92% {
    transform: translateX(65%) rotate(10deg);
    opacity: 0;
  }
}

@keyframes pulse {
  0%, 100% {
    opacity: .35;
    transform: scale(.9);
  }
  50% {
    opacity: 1;
    transform: scale(1.15);
  }
}
</style>
</head>

<body>
  <div class="clock-card">
    <div class="label">NOW</div>
    <div id="time">00:00 PM</div>
    <div id="date">SUN, JUL 05</div>
    <div class="dot"></div>
  </div>

<script>
function updateClock() {
  const now = new Date();

  const time = now.toLocaleTimeString("en-US", {
    hour: "2-digit",
    minute: "2-digit",
    hour12: true
  });

  const date = now.toLocaleDateString("en-US", {
    weekday: "short",
    month: "short",
    day: "2-digit"
  }).toUpperCase();

  document.getElementById("time").textContent = time;
  document.getElementById("date").textContent = date;
}

updateClock();
setInterval(updateClock, 1000);
</script>
</body>
</html>
