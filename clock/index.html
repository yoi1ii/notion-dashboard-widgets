<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Dream Clock</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  width: 100vw;
  height: 100vh;
  overflow: hidden;
  background: transparent;
}

.clock {
  width: 100vw;
  height: 100vh;
  position: relative;
  overflow: hidden;
  display: grid;
  place-items: center;
  background-image: url("bg.png");
  background-size: cover;
  background-position: center;
  isolation: isolate;
}

.clock::after {
  content: "";
  position: absolute;
  inset: 0;
  background:
    radial-gradient(circle at 50% 45%, rgba(255,255,255,.18), transparent 45%),
    linear-gradient(to bottom, rgba(255,255,255,.08), rgba(190,215,238,.08));
  z-index: 1;
  pointer-events: none;
}

.content {
  position: relative;
  z-index: 2;
  text-align: center;
  transform: translateY(2px);
}

.star {
  font-size: 18px;
  color: rgba(255,255,255,.92);
  text-shadow: 0 0 18px rgba(255,255,255,.9);
  margin-bottom: 22px;
  animation: twinkle 4s ease-in-out infinite;
}

.date {
  font-family: "Instrument Serif", serif;
  font-size: 20px;
  letter-spacing: .48em;
  color: rgba(83,112,153,.76);
  margin-bottom: 38px;
  text-transform: lowercase;
}

.time {
  font-family: "Instrument Serif", serif;
  font-size: clamp(88px, 18vw, 190px);
  line-height: .78;
  letter-spacing: .045em;
  font-weight: 400;
  color: rgba(255,255,255,.96);
  text-shadow:
    0 0 16px rgba(255,255,255,.7),
    0 8px 30px rgba(115,145,175,.2);
}

.caption-wrap {
  margin-top: 38px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 14px;
}

.line {
  width: 56px;
  height: 1px;
  background: rgba(89,117,155,.36);
}

.caption-star {
  font-size: 13px;
  color: rgba(80,112,153,.66);
}

.caption {
  margin-top: 10px;
  font-family: "Instrument Serif", serif;
  font-style: italic;
  font-size: 20px;
  letter-spacing: .35em;
  color: rgba(74,105,150,.74);
  text-transform: lowercase;
}

@keyframes twinkle {
  0%, 100% {
    opacity: .45;
    transform: scale(.9);
  }
  50% {
    opacity: 1;
    transform: scale(1.05);
  }
}
</style>
</head>

<body>
  <div class="clock">
    <div class="content">
      <div class="star">✦</div>
      <div id="date" class="date">sunday, july 05</div>
      <div id="time" class="time">04:04</div>

      <div class="caption-wrap">
        <div class="line"></div>
        <div class="caption-star">✶</div>
        <div class="line"></div>
      </div>

      <div class="caption">still, in dream</div>
    </div>
  </div>

<script>
function updateClock() {
  const now = new Date();

  const parts = new Intl.DateTimeFormat("en-US", {
    hour: "2-digit",
    minute: "2-digit",
    hour12: false
  }).formatToParts(now);

  const hour = parts.find(part => part.type === "hour")?.value || "00";
  const minute = parts.find(part => part.type === "minute")?.value || "00";

  const date = new Intl.DateTimeFormat("en-US", {
    weekday: "long",
    month: "long",
    day: "2-digit"
  }).format(now).toLowerCase();

  document.getElementById("time").textContent = hour + ":" + minute;
  document.getElementById("date").textContent = date;
}

updateClock();
setInterval(updateClock, 1000);
</script>
</body>
</html>
