<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mini Dream Clock</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  width: 100vw;
  height: 100vh;
  overflow: hidden;
  background: transparent;
  display: grid;
  place-items: center;
}

.clock {
  width: 250px;
  height: 140px;
  position: relative;
  overflow: hidden;
  border-radius: 24px;
  background-image: url("bg.png");
  background-size: cover;
  background-position: center;
  box-shadow: 0 14px 32px rgba(96, 125, 155, .16);
}

.clock::after {
  content: "";
  position: absolute;
  inset: 0;
  background: rgba(255,255,255,.08);
  pointer-events: none;
}

.content {
  position: relative;
  z-index: 2;
  width: 100%;
  height: 100%;
  text-align: center;
  padding-top: 26px;
}

.date {
  font-family: "Instrument Serif", serif;
  font-size: 12px;
  letter-spacing: .42em;
  color: rgba(67, 102, 145, .72);
  text-transform: lowercase;
  margin-bottom: 12px;
}

.time {
  font-family: "Instrument Serif", serif;
  font-size: 62px;
  line-height: .78;
  letter-spacing: .035em;
  color: rgba(255,255,255,.96);
  text-shadow:
    0 0 10px rgba(255,255,255,.7),
    0 5px 18px rgba(88, 118, 150, .22);
}

.caption-wrap {
  margin-top: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 9px;
}

.line {
  width: 32px;
  height: 1px;
  background: rgba(80, 112, 153, .34);
}

.symbol {
  font-size: 10px;
  color: rgba(70, 105, 150, .58);
}

.caption {
  margin-top: 5px;
  font-family: "Instrument Serif", serif;
  font-style: italic;
  font-size: 12px;
  letter-spacing: .24em;
  color: rgba(60, 95, 140, .72);
  text-transform: lowercase;
}
</style>
</head>

<body>
  <div class="clock">
    <div class="content">
      <div id="date" class="date">sunday, july 05</div>
      <div id="time" class="time">04:04</div>

      <div class="caption-wrap">
        <div class="line"></div>
        <div class="symbol">✶</div>
        <div class="line"></div>
      </div>

      <div class="caption">still, in dream</div>
    </div>
  </div>

<script>
function updateClock() {
  const now = new Date();

  const parts = new Intl.DateTimeFormat("en-US", {
    hour: "2-digit",
    minute: "2-digit",
    hour12: false
  }).formatToParts(now);

  const hour = parts.find(part => part.type === "hour")?.value || "00";
  const minute = parts.find(part => part.type === "minute")?.value || "00";

  const date = new Intl.DateTimeFormat("en-US", {
    weekday: "long",
    month: "long",
    day: "2-digit"
  }).format(now).toLowerCase();

  document.getElementById("time").textContent = hour + ":" + minute;
  document.getElementById("date").textContent = date;
}

updateClock();
setInterval(updateClock, 1000);
</script>
</body>
</html>
