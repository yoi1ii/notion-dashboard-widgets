<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mini Dream Clock</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: transparent;
}

body {
  display: flex;
  justify-content: center;
  align-items: center;
}

.clock {
  width: 100vw;
  height: 100vh;
  position: relative;
  overflow: hidden;
  border-radius: 22px;

  background-image: url("bg.png");
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;

  box-shadow: 0 10px 24px rgba(80, 110, 145, .13);
}

.clock::after {
  content: "";
  position: absolute;
  inset: 0;
  background: rgba(255,255,255,.05);
  pointer-events: none;
}

.content {
  position: relative;
  z-index: 2;
  width: 100%;
  height: 100%;
  text-align: center;

  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;

  transform: translateY(-1px);
}

.date {
  font-family: "Instrument Serif", serif;
  font-size: clamp(9px, 4vw, 13px);
  letter-spacing: .36em;
  color: rgba(57, 93, 138, .72);
  text-transform: lowercase;
  margin-bottom: clamp(7px, 2.5vw, 12px);
  white-space: nowrap;
}

.time {
  font-family: "Instrument Serif", serif;
  font-size: clamp(42px, 20vw, 72px);
  line-height: .78;
  letter-spacing: .02em;
  color: rgba(255,255,255,.97);
  text-shadow:
    0 0 9px rgba(255,255,255,.72),
    0 4px 15px rgba(75, 105, 140, .22);
  white-space: nowrap;
}

.caption-wrap {
  margin-top: clamp(9px, 3vw, 14px);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}

.line {
  width: clamp(20px, 10vw, 34px);
  height: 1px;
  background: rgba(70, 105, 150, .32);
}

.symbol {
  font-size: 9px;
  color: rgba(65, 100, 145, .55);
}

.caption {
  margin-top: 4px;
  font-family: "Instrument Serif", serif;
  font-style: italic;
  font-size: clamp(9px, 3.6vw, 12px);
  letter-spacing: .22em;
  color: rgba(55, 90, 135, .72);
  text-transform: lowercase;
  white-space: nowrap;
}
</style>
</head>

<body>
  <div class="clock">
    <div class="content">
      <div id="date" class="date">sunday, july 05</div>
      <div id="time" class="time">04:04</div>

      <div class="caption-wrap">
        <div class="line"></div>
        <div class="symbol">✶</div>
        <div class="line"></div>
      </div>

      <div class="caption">still, in dream</div>
    </div>
  </div>

<script>
function updateClock() {
  const now = new Date();

  const parts = new Intl.DateTimeFormat("en-US", {
    hour: "2-digit",
    minute: "2-digit",
    hour12: false
  }).formatToParts(now);

  const hour = parts.find(part => part.type === "hour")?.value || "00";
  const minute = parts.find(part => part.type === "minute")?.value || "00";

  const date = new Intl.DateTimeFormat("en-US", {
    weekday: "long",
    month: "long",
    day: "2-digit"
  }).format(now).toLowerCase();

  document.getElementById("time").textContent = hour + ":" + minute;
  document.getElementById("date").textContent = date;
}

updateClock();
setInterval(updateClock, 1000);
</script>
</body>
</html>
