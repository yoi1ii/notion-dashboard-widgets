<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Lumen Clock</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  width: 100vw;
  height: 100vh;
  display: grid;
  place-items: center;
  overflow: hidden;
  background: transparent;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, sans-serif;
}

.clock {
  width: 330px;
  height: 190px;
  position: relative;
  overflow: hidden;
  border-radius: 38px;
  padding: 24px 26px;

  background:
    radial-gradient(circle at 18% 12%, rgba(255,255,255,.72), transparent 30%),
    radial-gradient(circle at 78% 82%, rgba(176,205,225,.28), transparent 35%),
    linear-gradient(135deg, rgba(246,250,253,.58), rgba(210,225,238,.28));

  border: 1px solid rgba(255,255,255,.72);

  box-shadow:
    0 24px 60px rgba(92,120,145,.18),
    inset 0 1px 1px rgba(255,255,255,.9),
    inset 0 -28px 50px rgba(160,190,215,.12);

  backdrop-filter: blur(24px) saturate(120%);
  -webkit-backdrop-filter: blur(24px) saturate(120%);
}

.clock::before {
  content: "";
  position: absolute;
  inset: -60%;
  background: linear-gradient(
    115deg,
    transparent 40%,
    rgba(255,255,255,.58) 50%,
    transparent 60%
  );
  opacity: 0;
  animation: light 13s ease-in-out infinite;
}

.clock::after {
  content: "";
  position: absolute;
  inset: 10px;
  border-radius: 30px;
  border-top: 1px solid rgba(255,255,255,.58);
  border-left: 1px solid rgba(255,255,255,.28);
  pointer-events: none;
}

.date {
  position: relative;
  z-index: 2;
  text-align: center;
  font-size: 13px;
  letter-spacing: .16em;
  font-weight: 700;
  color: rgba(94,112,130,.66);
  margin-bottom: 8px;
}

.time-wrap {
  position: relative;
  z-index: 2;
  display: flex;
  justify-content: center;
  align-items: baseline;
  gap: 10px;
}

#time {
  font-size: 86px;
  line-height: .95;
  letter-spacing: -0.08em;
  font-weight: 800;
  color: rgba(255,255,255,.92);
  text-shadow:
    0 1px 12px rgba(95,120,145,.16),
    0 2px 24px rgba(255,255,255,.52);
}

#ampm {
  font-size: 15px;
  letter-spacing: .12em;
  font-weight: 800;
  color: rgba(255,255,255,.78);
  text-shadow: 0 1px 10px rgba(96,120,145,.18);
}

.sub {
  position: relative;
  z-index: 2;
  margin-top: 14px;
  display: flex;
  justify-content: center;
  gap: 9px;
  align-items: center;
  font-size: 11px;
  letter-spacing: .18em;
  font-weight: 700;
  color: rgba(103,124,143,.58);
}

.sub span {
  width: 4px;
  height: 4px;
  border-radius: 50%;
  background: rgba(255,255,255,.95);
  box-shadow: 0 0 14px rgba(190,220,242,.95);
}

.caustic {
  position: absolute;
  inset: 0;
  opacity: .16;
  background:
    radial-gradient(ellipse at 22% 36%, transparent 0 28%, rgba(255,255,255,.7) 29%, transparent 33%),
    radial-gradient(ellipse at 72% 28%, transparent 0 32%, rgba(255,255,255,.55) 33%, transparent 37%),
    radial-gradient(ellipse at 54% 84%, transparent 0 30%, rgba(190,220,240,.5) 31%, transparent 35%);
  filter: blur(.3px);
  animation: drift 10s ease-in-out infinite alternate;
}

@keyframes light {
  0%, 64%, 100% {
    opacity: 0;
    transform: translateX(-58%) rotate(8deg);
  }
  76% {
    opacity: .72;
  }
  88% {
    opacity: 0;
    transform: translateX(58%) rotate(8deg);
  }
}

@keyframes drift {
  from {
    transform: translate(-5px, -2px) scale(1);
  }
  to {
    transform: translate(6px, 4px) scale(1.03);
  }
}

@media (hover:hover) {
  .clock {
    transition: transform .35s ease, box-shadow .35s ease;
  }

  .clock:hover {
    transform: translateY(-2px);
    box-shadow:
      0 30px 70px rgba(92,120,145,.2),
      inset 0 1px 1px rgba(255,255,255,.9),
      inset 0 -28px 50px rgba(160,190,215,.14);
  }
}
</style>
</head>

<body>
  <div class="clock">
    <div class="caustic"></div>

    <div id="date" class="date">SUN · JUL 05</div>

    <div class="time-wrap">
      <div id="time">00:00</div>
      <div id="ampm">AM</div>
    </div>

    <div class="sub">
      LUMEN <span></span> GLASS
    </div>
  </div>

<script>
function updateClock() {
  const now = new Date();

  const parts = new Intl.DateTimeFormat("en-US", {
    hour: "2-digit",
    minute: "2-digit",
    hour12: true
  }).formatToParts(now);

  const hour = parts.find(p => p.type === "hour").value;
  const minute = parts.find(p => p.type === "minute").value;
  const ampm = parts.find(p => p.type === "dayPeriod")?.value || "";

  const date = new Intl.DateTimeFormat("en-US", {
    weekday: "short",
    month: "short",
    day: "2-digit"
  }).format(now).replace(",", " ·").toUpperCase();

  document.getElementById("time").textContent = `${hour}:${minute}`;
  document.getElementById("ampm").textContent = ampm;
  document.getElementById("date").textContent = date;
}

updateClock();
setInterval(updateClock, 1000);
</script>
</body>
</html>
